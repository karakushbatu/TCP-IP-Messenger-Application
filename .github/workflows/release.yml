name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Ruff
        run: python -m ruff check src/ tests/

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --cov=src/protocol --cov-report=term-missing --cov-fail-under=90

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Build macOS (DMG + ZIP)
        run: bash build/build_macos.sh

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: Protocol-Bridge-macOS-dmg
          path: dist/Protocol-Bridge-macOS.dmg

      - name: Upload macOS ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Protocol-Bridge-macOS-zip
          path: dist/Protocol-Bridge-macOS.zip

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Build Windows
        run: build\build_windows.bat

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Protocol-Bridge-Windows
          path: dist/Protocol-Bridge-Windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/Protocol-Bridge-macOS-dmg/Protocol-Bridge-macOS.dmg
            artifacts/Protocol-Bridge-macOS-zip/Protocol-Bridge-macOS.zip
            artifacts/Protocol-Bridge-Windows/Protocol-Bridge-Windows.zip
